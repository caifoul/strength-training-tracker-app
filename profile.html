<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile – Strength Tracker</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="auth-guard.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div class="header-top">
          <div>
            <h1>Your Profile</h1>
            <p>View and manage your account and training preferences.</p>
          </div>
          <nav class="nav-links">
            <a href="home.html">Dashboard</a>
            <a href="index.html">Log Workout</a>
            <a href="profile.html">Profile</a>
            <a href="chatbot.html">AI Assistant</a>
            <a href="favorites.html">Favorites</a>
            <a href="coach.html">Coach</a>
          </nav>
        </div>
      </header>

      <section class="log-card">
        <div class="log-header">
          <h2>Account Information</h2>
          <button type="button" id="edit-account-btn" class="btn-secondary">Edit</button>
        </div>
        <div id="account-info">
          <p>Loading account info...</p>
        </div>
      </section>

      <section class="log-card">
        <div class="log-header">
          <h2>Training Profile</h2>
          <button type="button" id="edit-profile-btn" class="btn-secondary">Edit</button>
        </div>
        <div id="profile-info">
          <p>Loading profile info...</p>
        </div>
      </section>

      <section class="log-card" id="hypertrophy-section" style="display: none;">
        <div class="log-header">
          <h2>Hypertrophy Goals</h2>
          <button type="button" id="edit-hypertrophy-btn" class="btn-secondary">Edit</button>
        </div>
        <div id="hypertrophy-info">
          <p>Loading details...</p>
        </div>
      </section>

      <!-- Edit Modal -->
      <div id="edit-modal" class="modal hidden">
        <div class="modal-content">
          <div class="modal-header">
            <h2 id="edit-modal-title">Edit Profile</h2>
            <button type="button" id="close-modal" class="close-btn">&times;</button>
          </div>
          <form id="edit-form">
            <div id="edit-form-fields"></div>
            <div class="button-group">
              <button type="button" id="cancel-edit" class="btn-secondary">Cancel</button>
              <button type="submit" class="btn-primary">Save Changes</button>
            </div>
          </form>
        </div>
      </div>
    </main>

    <script src="profile.js"></script>
  </body>
</html>
