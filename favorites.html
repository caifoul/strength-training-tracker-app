<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Favorites – Strength Tracker</title>
    <link rel="stylesheet" href="styles.css" />
    <style>body { visibility: hidden; }</style>
    <script type="module" src="auth-guard.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div class="header-top">
          <div>
            <h1>My Workouts</h1>
            <p>All your saved sessions. Star one to make it available in Coach.</p>
          </div>
          <nav class="nav-links">
            <a href="home.html">Dashboard</a>
            <a href="index.html">Log Workout</a>
            <a href="coach.html">Coach</a>
            <a href="sg-workout.html">S.G. Workout</a>
            <a href="favorites.html">Favorites</a>
            <a href="profile.html">Profile</a>
          </nav>
        </div>
      </header>

      <section class="log-card">
        <div class="log-header">
          <h2>Saved Workouts</h2>
          <button id="clear-favorites" class="secondary-button">Unstar All</button>
        </div>
        <div id="favorites-list" class="workout-list">
          <p class="empty-state">No workouts saved yet.</p>
        </div>
      </section>
    </main>

    <script type="module" src="favorites.js"></script>
    <script src="music-widget.js"></script>
  </body>
</html>
